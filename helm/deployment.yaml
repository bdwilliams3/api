apiVersion: v1
kind: Namespace
metadata:
  name: cloudflare
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflare
data:
  config.yml: |
    tunnel: ${CLOUDFLARE_TUNNEL_ID}
    credentials-file: /etc/cloudflared/credentials.json
    ingress:
      - hostname: sample-api.com
        service: http://istio-ingressgateway.istio-system.svc.cluster.local:80
        originRequest:
          httpHostHeader: sample-api.com
      - service: http_status:404
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        args:
        - tunnel
        - --config
        - /etc/cloudflared/config.yml
        - run
        volumeMounts:
        - name: config
          mountPath: /etc/cloudflared/config.yml
          subPath: config.yml
          readOnly: true
        - name: credentials
          mountPath: /etc/cloudflared/credentials.json
          subPath: credentials.json
          readOnly: true
        resources:
          limits:
            cpu: "100m"
            memory: "128Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
      volumes:
      - name: config
        configMap:
          name: cloudflared-config
      - name: credentials
        secret:
          secretName: cloudflared-credentials
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k-api
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k-api
  template:
    metadata:
      labels:
        app: k-api
        sidecar.istio.io/inject: "true"
      annotations:
        sidecar.istio.io/proxyCPU: "100m"
        sidecar.istio.io/proxyMemory: "128Mi"
        sidecar.istio.io/proxyCPULimit: "200m"
        sidecar.istio.io/proxyMemoryLimit: "256Mi"
    spec:
      automountServiceAccountToken: false
      containers:
      - name: k-api
        image: ghcr.io/bdwilliams3/k-api:master-1773500491-8be0c48 # {"$imagepolicy": "flux-system:k-api"}
        imagePullPolicy: IfNotPresent
        env:
        - name: INTERNAL_SEED
          valueFrom:
            secretKeyRef:
              name: k-api-secrets
              key: INTERNAL_SEED
        - name: API_USER
          value: "api_hunter"
        - name: API_PASS
          value: "p@s5W0rD"
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "360m"
            memory: "512Mi"
          requests:
            cpu: "180m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: k-api-service
  namespace: default
spec:
  selector:
    app: k-api
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemini-mcp
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gemini-mcp
  template:
    metadata:
      labels:
        app: gemini-mcp
        sidecar.istio.io/inject: "true"
    spec:
      containers:
      - name: mcp-server
        image: node:20-alpine
        stdin: true
        tty: true
        command: ["npx", "-y", "@modelcontextprotocol/server-google-gemini"]
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-credentials
              key: GEMINI_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: gemini-mcp
  namespace: default
spec:
  selector:
    app: gemini-mcp
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
